services:
  - type: web
    name: universal-problem-optimizer-agent-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: QWEN_MODEL
        value: qwen-plus
